<html>
    <head>
        <title>Itowns - 3D Tiles on 2.5D map example</title>

        <meta charset="UTF-8">
        <link rel="stylesheet" type="text/css" href="css/example.css">
        <link rel="stylesheet" type="text/css" href="css/LoadingScreen.css">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <script src="https://cdnjs.cloudflare.com/ajax/libs/dat-gui/0.7.6/dat.gui.min.js"></script>
    </head>
    <body>
        <div style="display:none;">
            <img id="imgData" width=200 height=200>
            <a class="button" id="anchor" download="imageName.jpg">Download image</a>
        </div>
        <div id="viewerDiv" class="viewer">
        </div>
        <script src="../dist/itowns.js"></script>
        <script src="js/GUI/LoadingScreen.js"></script>
        <script src="../dist/debug.js"></script>
        <script src="js/GUI/GuiTools.js"></script>
        <script src="js/3dTilesHelper.js"></script>
        <script type="text/javascript">
            // Define crs projection that we will use (taken from https://epsg.io/3946, Proj4js section)
            itowns.proj4.defs('EPSG:3946', '+proj=lcc +lat_1=45.25 +lat_2=46.75 +lat_0=46 +lon_0=3 +x_0=1700000 +y_0=5200000 +ellps=GRS80 +towgs84=0,0,0,0,0,0,0 +units=m +no_defs');

            // Define geographic extent: CRS, min/max X, min/max Y
            var extent = new itowns.Extent( 'EPSG:3946',
                1837816.94334, 1847692.32501,
                5170036.4587, 5178412.82698);

            // `viewerDiv` will contain iTowns' rendering area (`<canvas>`)
            var viewerDiv = document.getElementById('viewerDiv');

            // Instanciate PlanarView*
            var cameraCoord = new itowns.Coordinates('EPSG:3946', 1841980,
                5175682, 3000)
            var view = new itowns.PlanarView(viewerDiv, extent, {
                camera: { type: itowns.CAMERA_TYPE.ORTHOGRAPHIC },
                placement: extent,
                controls: {
                    // Faster zoom in/out speed
                    zoomFactor: 3,
                    // prevent from zooming in too much
                    maxResolution: 0.005  // a pixel shall not represent a metric size smaller than 5 mm
                },
                }
            );

            setupLoadingScreen(viewerDiv, view);

            // Add a WMS imagery source
            var wmsImagerySource = new itowns.WMSSource({
                extent: extent,
                name: 'Ortho2009_vue_ensemble_16cm_CC46',
                url: 'https://download.data.grandlyon.com/wms/grandlyon',
                version: '1.3.0',
                crs: 'EPSG:3946',
                format: 'image/jpeg',
            });

            // Add a WMS imagery layer
            var wmsImageryLayer = new itowns.ColorLayer('wms_imagery', {
                updateStrategy: {
                    type: itowns.STRATEGY_DICHOTOMY,
                    options: {},
                },
                source: wmsImagerySource,
            });

            view.addLayer(wmsImageryLayer);

            // Add a WMS elevation source
            var wmsElevationSource = new itowns.WMSSource({
                extent: extent,
                url: 'https://download.data.grandlyon.com/wms/grandlyon',
                name: 'MNT2012_Altitude_10m_CC46',
                crs: 'EPSG:3946',
                width: 256,
                format: 'image/jpeg',
            });

            // Add a WMS elevation layer
            var wmsElevationLayer = new itowns.ElevationLayer('wms_elevation', {
                useColorTextureElevation: true,
                colorTextureElevationMinZ: 144,
                colorTextureElevationMaxZ: 622,
                source: wmsElevationSource,
            });

            view.addLayer(wmsElevationLayer);

            // Add 3D Tiles layer
            // This 3D Tiles tileset uses the draco compression that is an
            // extension of gltf. We need to enable it.
            itowns.enableDracoLoader('./libs/draco/');

            const depthMaterial = new itowns.LayeredMaterial({}, 1);

            depthMaterial.mode = 1;

            var $3dTilesLayer = new itowns.C3DTilesLayer(
                '3d-tiles-layer-building', {
                    name: 'Lyon-2015-building',
                    overrideMaterials: depthMaterial,
                    source: new itowns.C3DTilesSource({
                        url: 'https://raw.githubusercontent.com/iTowns/iTowns2-sample-data/master/' +
                            '3DTiles/lyon_1_3946_textured_draco/tileset.json',
                    }),
                }, view);

            itowns.View.prototype.addLayer.call(view, $3dTilesLayer).then(l => {
                view.tileLayer.object3d.add(l.object3d);
            });
            document.addEventListener('keydown', (event) => {
                if (event.key === 'd') {
                    view.exportDepthBuffer();
                }
            }, false);
        </script>
    </body>
</html>
