
<html>
    <head>
        <title>Globe</title>
        <link rel="stylesheet" type="text/css" href="examples/css/example.css">
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <script src="https://cdnjs.cloudflare.com/ajax/libs/dat-gui/0.7.6/dat.gui.min.js"></script>
    </head>
    <body>
        <div id="viewerDiv" class="viewer"></div>
        <script src="examples/js/GUI/GuiTools.js"></script>
        <script src="dist/itowns.js"></script>
        <script src="dist/debug.js"></script>
        <script type="text/javascript">
            var epsgStr = 'EPSG:3785'
            var maxLevel = 17

            // var bbox = [ 1200978.58991277, 8382390.26904445, 1203424.57481807, 8384836.25394975]
            // var extent = new itowns.Extent(
            //     epsgStr,
            //     bbox[0], bbox[2], bbox[1], bbox[3]
            // );

            var extent = new itowns.Extent(
                'EPSG:3857',
                -20026376.39, 20026376.39,
                -20048966.10, 20048966.10);
            //var serverUrl = 'http://localhost:8000'
            var serverUrl = 'https://gis.iconiqlabs.com'
            var imagineryLayerName = 'BlomURBEX:ORTHO'
            var imagineryUrl = serverUrl + '/wmtsproxy/wmts/www.blomurbex.com_v02_WMTSService_usertoken=f09a79758ffcb07ab2fdc8c54ff57b54_BlomURBEX_ORTHO__null_image_jpeg_EPSG_3785-EPSG_3785_image_jpeg'
            var imagineryFormat = 'image/jpeg'
            var imagineryStyle = 'default'

            var elevationUrl = serverUrl + '/wmtsproxy/elevation/Oslo_test_terrain_EPSG_3785.obj'
            var elevationFormat = 'image/jpeg'

            // Add a WMS imagery source
            var wmtsImagerySource = new itowns.WMTSSource({
               // extent: extent,
                name: imagineryLayerName,
                projection: epsgStr,
                tileMatrixSet: epsgStr,
                url: imagineryUrl,
                format: imagineryFormat,
                style: imagineryStyle,
            });


            // Add a WMS elevation source
            var wmsElevationSource = new itowns.WMTSSource({
               // extent: extent,
                url: elevationUrl,
                name: 'elevation',
                projection: epsgStr,
                tileMatrixSet: epsgStr,
                width: 256,
                format: elevationFormat,
            });

            // Define projection that we will use (taken from https://epsg.io/25832, Proj4js section)
            itowns.proj4.defs(epsgStr);
            /* global itowns, setupLoadingScreen, GuiTools, debug */
            // # Planar (EPSG:3946) viewer

            var viewerDiv;
            var view;
            var p;
            var menuGlobe;
            var d;


            // `viewerDiv` will contain iTowns' rendering area (`<canvas>`)
            viewerDiv = document.getElementById('viewerDiv');

            // Instanciate PlanarView*
            view = new itowns.PlanarView(viewerDiv, extent, { maxSubdivisionLevel: maxLevel });

            wmtsImagerySource.networkOptions.crossOrigin = "omit";

            // Add a WMTS imagery layer
            var wmtsImageryLayer = new itowns.ColorLayer('wmts_imagery', {
                updateStrategy: {
                    type: itowns.STRATEGY_DICHOTOMY,
                    options: {},
                },
                source: wmtsImagerySource,

            });
            view.addLayer(wmtsImageryLayer);


            // Add a WMS elevation layer
            var wmsElevationLayer = new itowns.ElevationLayer('wms_elevation', {
                useColorTextureElevation: true,
                colorTextureElevationMinZ: 144,
                colorTextureElevationMaxZ: 622,
                source: wmsElevationSource,
            });

            view.addLayer(wmsElevationLayer);


            // // instanciate controls
            // eslint-disable-next-line no-new
            new itowns.PlanarControls(view, {});

            // Request redraw
            view.notifyChange();

            if (view.isDebugMode) {
                menuGlobe = new GuiTools('menuDiv', view);
                menuGlobe.addImageryLayersGUI(view.getLayers(function gui(l) { return l.isColorLayer; }));
               // menuGlobe.addElevationLayerGUI(wmsElevationLayer);
                debug.createTileDebugUI(menuGlobe.gui, view);
            }
        </script>
    </body>
</html>
